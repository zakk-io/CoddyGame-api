<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CoddyGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96">
            <h2 class="text-2xl font-bold text-center mb-6 ">login Account</h2>
            
            <form class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" required>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md" required>
                </div>
                
                
                <button type="submit" class="w-full bg-[#111827] text-white py-2 px-4 rounded-md hover:bg-blue-700">
                    Login
                </button>
            </form>
            
            <div class="mt-6">
                <div class="relative">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>
                
                <div class="mt-6 grid grid-cols-2 gap-3">
                <a href="/api/auth/oauth2/google">
                    <button class="flex justify-center items-center px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50">
                        <img src="https://www.google.com/favicon.ico" alt="Google" class="h-5 w-5 mr-2">
                        Google
                    </button>
                </a>
                    
                <a href="/api/auth/oauth2/linkedIn">
                    <button class="flex justify-center items-center px-4 py-2 border border-gray-300 rounded-md hover:bg-gray-50">
                        <img src="https://www.linkedin.com/favicon.ico" alt="linkedin" class="h-5 w-5 mr-2">
                        linkedin
                    </button>
                </a>
                </div>
            </div>

        </div>
    </div>
</body>
</html></div>

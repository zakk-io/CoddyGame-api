<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Workplace</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <!-- Team Header -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body d-flex align-items-center">
                        <img id="teamAvatar" src="" alt="Team Avatar" class="rounded-circle me-3" style="width: 64px; height: 64px; object-fit: cover;">
                        <div>
                            <h2 id="teamName" class="mb-0"></h2>
                            <span id="teamType" class="badge bg-primary"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>



        <!-- Team Members -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Team Members</h5>
                        <div id="teamMembers" class="list-group">
                            <!-- Members will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Function to fetch and display team data
        async function fetchTeamData() {
            try {
                const response = await fetch(`/api/teams/${window.location.pathname.split('/').pop()}`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    const team = data.team;
                    document.getElementById('teamAvatar').src = team.avatar;
                    document.getElementById('teamName').textContent = team.name;
                    document.getElementById('teamType').textContent = team.type;
                    document.getElementById('teamDescription').textContent = team.description;
                    document.getElementById('teamCreatedAt').textContent = new Date(team.createdAt).toLocaleDateString();
                }
            } catch (error) {
                console.error('Error fetching team data:', error);
            }
        }

            // Function to fetch and display team members
            async function fetchTeamMembers() {
                try {
                    const teamId = window.location.pathname.split('/').pop();
                    const response = await fetch(`/api/teams/${teamId}/members`);
                    const data = await response.json();
                    
                    if (data.status === 'success') {
                        const membersList = document.getElementById('teamMembers');
                        membersList.innerHTML = data.members.map(member => `
                            <div class="list-group-item d-flex align-items-center">
                                <img src="${member.avatar}" alt="${member.username}" class="rounded-circle me-3" style="width: 40px; height: 40px; object-fit: cover;">
                                <div>
                                    <h6 class="mb-0">${member.first_name} ${member.last_name}</h6>
                                    <small class="text-muted">@${member.username} - ${member.role}</small>
                                </div>
                            </div>
                        `).join('');
                    }
                } catch (error) {
                    console.error('Error fetching team members:', error);
                }
            }


        // Initialize the page
        document.addEventListener('DOMContentLoaded', () => {
            fetchTeamData();
            fetchTeamMembers();
        });
    </script>
</body>
</html></div>
